.tbb.on{color:var(--ac)}.tbb span:first-child{font-size:22px}.tbb span:last-child{font-size:10px;font-weight:600;letter-spacing:.5px}

.pbar{height:6px;border-radius:3px;background:var(--bd);overflow:hidden}.pfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ac),#34D399);transition:width 1s}
.tld{position:absolute;left:20px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--ac),var(--bd))}
.tln{width:40px;height:40px;border-radius:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;z-index:1}
.tln.ok{background:var(--ag);border:2px solid var(--ac)}.tln.no{background:var(--card);border:2px solid var(--bd)}

<div id="R"></div>
<script>
// ═══ DATA ═══
const HTL=[{m:20,t:"Пульс нормализуется",d:"ЧСС и давление возвращаются к норме",i:"❤️",l:"20 мин"},{m:480,t:"Кислород восстанавливается",d:"Угарный газ снижается, кислород к органам",i:"🫁",l:"8 ч"},{m:1440,t:"Риск инфаркта снижается",d:"Через 24 часа снижается риск сердечного приступа",i:"🫀",l:"1 день"},{m:2880,t:"Вкус и запах возвращаются",d:"Нервные окончания восстанавливаются",i:"👃",l:"2 дня"},{m:4320,t:"Дышать легче",d:"Бронхи расслабляются, энергия растёт",i:"🌬️",l:"3 дня"},{m:20160,t:"Кровообращение улучшается",d:"Функция лёгких растёт",i:"🩸",l:"14 дн"},{m:43200,t:"Кашель уменьшается",d:"Реснички лёгких восстанавливаются",i:"✨",l:"30 дн"},{m:129600,t:"Лёгкие восстановились",d:"Иммунитет укрепляется",i:"🛡️",l:"3 мес"},{m:525600,t:"Риск ИБС снижен вдвое",d:"Риск ишемической болезни вдвое ниже",i:"🏆",l:"1 год"}];

const MOT=["Тяга длится 3-5 мин. Ты сильнее.","Каждая минута — минута здоровья.","Ты выбираешь свободу.","Твоё тело восстанавливается.","Один день за раз.","Никотин — облегчение абстиненции, не удовольствие.","Курение создаёт стресс, а не снимает.","Ты прошёл самое трудное.","Деньги — награда за волю.","3% бросают сами. С поддержкой — 24%."];
const DMG=["Каждая сигарета сокращает жизнь на 11 минут.","В дыме >7000 хим. соединений, 70 — канцерогены.","Курение — причина 30% всех смертей от рака.","Риск инфаркта у курильщика в 2-4 раза выше.","Курение старит кожу на 10-20 лет быстрее.","Сигарета содержит угарный газ, мышьяк и формальдегид.","20 сигарет/день = ~7300/год = 2 месяца жизни потеряно.","Никотин сужает сосуды — страдают все органы.","У курильщиков в 2 раза чаще развивается слепота.","Курение снижает плотность костей."];

// ═══ STATE ═══
let P=null,Q=null,tl=[],sa=[],tc=0,td=new Date().toDateString(),dl={},lc=null,hl=[],ct="th",mi=0,di=0,st=null,tp="day",cp="day",bti=null;

// ═══ STORAGE ═══
const SK=["qp","qq","qt","qa","qc","qd","ql","qh"];
function sv(){try{localStorage.setItem("qp",JSON.stringify(P));localStorage.setItem("qq",JSON.stringify(Q));localStorage.setItem("qt",JSON.stringify(tl));localStorage.setItem("qa",JSON.stringify(sa));localStorage.setItem("qc",JSON.stringify({d:td,c:tc}));localStorage.setItem("qd",JSON.stringify(dl));localStorage.setItem("ql",JSON.stringify(lc));localStorage.setItem("qh",JSON.stringify(hl));}catch(e){}}
function ld(){try{let v;v=localStorage.getItem("qp");if(v)P=JSON.parse(v);v=localStorage.getItem("qq");if(v)Q=JSON.parse(v);v=localStorage.getItem("qt");if(v)tl=JSON.parse(v);v=localStorage.getItem("qa");if(v)sa=JSON.parse(v);v=localStorage.getItem("qc");if(v){const d=JSON.parse(v);if(d.d===new Date().toDateString()){tc=d.c;td=d.d;}}v=localStorage.getItem("qd");if(v)dl=JSON.parse(v);v=localStorage.getItem("ql");if(v)lc=JSON.parse(v);v=localStorage.getItem("qh");if(v)hl=JSON.parse(v);}catch(e){}}

const $=id=>document.getElementById(id);
const qm=()=>!!Q;
function fmt(m){if(m<60)return m+" мин";if(m<1440)return Math.floor(m/60)+" ч "+m%60+" мин";return Math.floor(m/1440)+" д "+Math.floor((m%1440)/60)+" ч";}

// ═══ INIT ═══
ld();
setTimeout(()=>{if(P)startApp();else showSetup();},400);

// ═══ SETUP ═══
function showSetup(){$("R").innerHTML=`<div style="padding:24px 20px;min-height:100dvh" class="fi">
<div style="display:flex;gap:6px;justify-content:center;margin-bottom:40px;margin-top:12px"><div id="sd0" style="width:24px;height:8px;border-radius:4px;background:var(--ac);transition:all .3s"></div><div id="sd1" style="width:8px;height:8px;border-radius:4px;background:var(--bd);transition:all .3s"></div></div>
<div id="s0"><div style="font-size:40px;margin-bottom:12px">🌿</div><h1 style="font-size:28px;font-weight:800;margin-bottom:8px;line-height:1.2">Дыши свободно</h1><p style="color:var(--td);font-size:16px;line-height:1.5;margin-bottom:32px">Начни с осознания. Приложение покажет реальную цену привычки, а когда будешь готов — поможет бросить</p><div style="margin-bottom:32px"><label style="font-size:13px;color:var(--tm);display:block;margin-bottom:8px;letter-spacing:1px">КАК ТЕБЯ ЗОВУТ?</label><input class="inp" id="iname" placeholder="Имя"></div><button class="bp" onclick="goS(1)">Продолжить →</button></div>
<div id="s1" class="hd fi"><h2 style="font-size:24px;font-weight:800;margin-bottom:8px">📊 Привычка</h2><p style="color:var(--td);font-size:15px;margin-bottom:28px">Расскажи о своём потреблении</p>
<div style="margin-bottom:24px"><label style="font-size:13px;color:var(--tm);display:block;margin-bottom:8px;letter-spacing:1px">СИГАРЕТ В ДЕНЬ</label><div style="display:flex;align-items:center;gap:16px"><button class="cb" onclick="SC(-1)">−</button><div style="flex:1;text-align:center"><div id="scd" style="font-size:48px;font-weight:800;color:var(--ac)">20</div><div style="font-size:12px;color:var(--tm)">сигарет / день</div></div><button class="cb" onclick="SC(1)">+</button></div></div>
<div style="display:flex;gap:12px;margin-bottom:28px"><div style="flex:1"><label style="font-size:13px;color:var(--tm);display:block;margin-bottom:8px;letter-spacing:1px">ЦЕНА / ПАЧКА (€)</label><input class="inp" id="iprc" type="number" value="5" inputmode="decimal"></div><div style="flex:1"><label style="font-size:13px;color:var(--tm);display:block;margin-bottom:8px;letter-spacing:1px">ШТ В ПАЧКЕ</label><input class="inp" id="ipak" type="number" value="20" inputmode="numeric"></div></div>
<div style="display:flex;gap:10px"><button class="bs" onclick="goS(0)" style="flex:1">← Назад</button><button class="bp" onclick="finishSetup()" style="flex:1">🌿 Начать</button></div></div></div>`;
}
let sc=20,ss=0;
function goS(n){$("s"+ss).classList.add("hd");ss=n;$("s"+ss).classList.remove("hd");$("sd0").style.width=n===0?"24px":"8px";$("sd0").style.background=n>=0?"var(--ac)":"var(--bd)";$("sd1").style.width=n===1?"24px":"8px";$("sd1").style.background=n>=1?"var(--ac)":"var(--bd)";}
function SC(d){sc=Math.max(1,sc+d);$("scd").textContent=sc;}
function finishSetup(){P={name:$("iname").value||"Друг",dc:sc,pp:parseFloat($("iprc").value)||5,pk:parseInt($("ipak").value)||20,sd:new Date().toISOString()};sv();startApp();}

// ═══ APP ═══
function startApp(){buildUI();render();setInterval(render,60000);setInterval(()=>{mi=(mi+1)%MOT.length;di=(di+1)%DMG.length;render();},10000);}

function buildUI(){
const tabs=qm()?`<button class="tbb on" onclick="go('home')" id="b_home"><span>🏠</span><span>Главная</span></button><button class="tbb" onclick="go('health')" id="b_health"><span>🫁</span><span>Здоровье</span></button><button class="tbb" onclick="go('tools')" id="b_tools"><span>🧠</span><span>КПТ</span></button><button class="tbb" onclick="go('stats')" id="b_stats"><span>📊</span><span>Журнал</span></button><button class="tbb" onclick="go('awards')" id="b_awards"><span>🏆</span><span>Награды</span></button>`
:`<button class="tbb on" onclick="go('th')" id="b_th"><span>🏠</span><span>Главная</span></button><button class="tbb" onclick="go('stats')" id="b_stats"><span>📊</span><span>Журнал</span></button>`;
$("R").innerHTML=`<div id="V" style="padding-bottom:100px"></div><div class="tb"><div class="tbi">${tabs}</div></div><div id="BO" class="bo hd" onclick="stopB()"><div id="bcy" style="font-size:14px;color:var(--tm);margin-bottom:32px;letter-spacing:2px"></div><div id="bci" class="bc" style="width:100px;height:100px"><div id="btx" style="font-size:20px;font-weight:700;color:var(--ac)"></div><div id="btm" style="font-size:14px;color:var(--td);margin-top:4px"></div></div><div style="font-size:13px;color:var(--tm);margin-top:40px">Нажмите чтобы закрыть</div></div><div id="AT" class="at hd"></div><div id="QM" class="hd" style="position:fixed;inset:0;z-index:800;background:rgba(12,27,22,.97);display:flex;align-items:center;justify-content:center;padding:24px"></div>`;
ct=qm()?"home":"th";go(ct);
}

function go(t){ct=t;render();}

// ═══ RENDER ═══
function render(){
if(!P)return;
const tabs=qm()?["home","health","tools","stats","awards"]:["th","stats"];
tabs.forEach(t=>{const b=$("b_"+t);if(b)b.classList.toggle("on",t===ct);});
const V=$("V");
if(ct==="th")V.innerHTML=renderTrack();
else if(ct==="home"&&qm())V.innerHTML=renderQuitHome();
else if(ct==="health")V.innerHTML=renderHealth();
else if(ct==="tools")V.innerHTML=renderTools();
else if(ct==="stats")V.innerHTML=renderStats();
else if(ct==="awards")V.innerHTML=renderAwards();
}

// ═══ TRACKING HOME ═══
function renderTrack(){
const ppc=P.pp/P.pk;
const s=getTrkS(tp);
const pl=tp==="day"?"сегодня":tp==="week"?"за неделю":"за месяц";
const yc=P.dc*365,ym=yc*ppc,yt=Math.round(yc*7/60),yd=Math.round(P.dc*365*11/1440);

<div style="font-size:14px;color:var(--td);margin-bottom:4px">Сегодня выкурено</div>

<button class="cb" onclick="adj(1)">+</button>
</div>
<div style="font-size:12px;color:var(--tm);margin-top:6px">Обычная норма: ${P.dc} / день</div></div>
<div style="display:flex;gap:4px;justify-content:center;margin-bottom:16px">

</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
${[{l:"Выкурено "+pl,v:s.sm,u:"шт",i:"🚬",c:"var(--w)"},{l:"Потрачено",v:"€"+s.mn.toFixed(1),u:"",i:"💸",c:"var(--dg)"},{l:"Времени сгорело",v:fmt(s.tm),u:"",i:"⏰",c:"#818CF8"}].map(x=>`<div style="padding:14px 12px;border-radius:14px;background:var(--card);border:1px solid var(--bd);text-align:center"><div style="font-size:16px;margin-bottom:6px">${x.i}</div><div style="font-size:18px;font-weight:800;color:${x.c}">${x.v}${x.u?`<span style="font-size:10px;font-weight:400;margin-left:2px">${x.u}</span>`:""}</div><div style="font-size:10px;color:var(--tm);margin-top:4px">${x.l}</div></div>`).join("")}
</div>
<div class="cd" style="margin-bottom:16px;border-color:rgba(245,158,11,.2)">

function renderAwards(){if(!qm())return"";const s=getQS();return`<div style="padding:20px 20px"><h2 style="font-size:22px;font-weight:800;margin-bottom:4px">🏆 Достижения</h2><p style="font-size:13px;color:var(--td);margin-bottom:20px">${sa.length} из ${ACH.length}</p>
<div style="height:8px;border-radius:4px;background:var(--bd);margin-bottom:24px;overflow:hidden"><div style="height:100%;border-radius:4px;background:linear-gradient(90deg,var(--ac),var(--w));width:${(sa.length/ACH.length)*100}%"></div></div>
${ACH.map(a=>{const u=sa.includes(a.id);return`<div style="display:flex;align-items:center;gap:16px;padding:16px 18px;border-radius:16px;background:${u?'var(--card)':'rgba(20,43,34,.5)'};border:1px solid ${u?'rgba(74,222,128,.25)':'var(--bd)'};opacity:${u?1:.5};margin-bottom:12px"><div style="width:48px;height:48px;border-radius:14px;flex-shrink:0;background:${u?'var(--ag)':'rgba(30,68,50,.3)'};display:flex;align-items:center;justify-content:center;font-size:24px">${u?a.i:'🔒'}</div><div style="flex:1"><div style="font-size:15px;font-weight:700;color:${u?'var(--tx)':'var(--tm)'}">${a.t}</div><div style="font-size:12px;color:var(--td);margin-top:2px">${a.d}</div></div>${u?'<div style="font-size:11px;color:var(--ac);font-weight:600">✓</div>':''}</div>`;}).join("")}
${Q.rs&&Q.rs.length?`<div style="margin-top:28px;padding:20px;border-radius:16px;background:var(--ag);border:1px solid rgba(34,112,63,.2)"><div style="font-size:14px;font-weight:700;color:var(--ac);margin-bottom:10px">🎯 Твои причины:</div><div style="display:flex;flex-wrap:wrap;gap:8px">${Q.rs.map(r=>`<span style="padding:6px 14px;border-radius:20px;background:rgba(74,222,128,.08);color:var(--ac);font-size:13px">${r}</span>`).join("")}</div></div>`:""}
<button onclick="if(confirm('Сбросить все данные?')){${SK.map(k=>`localStorage.removeItem('${k}')`).join(";")};location.reload();}" style="width:100%;margin-top:32px;padding:14px 0;border-radius:12px;border:1px solid rgba(239,68,68,.2);background:transparent;color:var(--dg);font-size:14px;cursor:pointer;opacity:.6">⟲ Сбросить</button></div>`;}

// ═══ ACHIEVEMENT TOAST ═══
function showAT(a){const t=$("AT");t.innerHTML=`<div style="font-size:36px">${a.i}</div><div><div style="font-size:12px;color:var(--ac);font-weight:700;letter-spacing:1px">ДОСТИЖЕНИЕ!</div><div style="font-size:16px;font-weight:700;margin-top:2px">${a.t}</div><div style="font-size:12px;color:var(--td)">${a.d}</div></div>`;t.classList.remove("hd");setTimeout(()=>t.classList.add("hd"),4000);}

// ═══ BREATHING ═══
function startB(){$("BO").classList.remove("hd");runB(0);}
function runB(c){if(c>=3){stopB();return;}$("bcy").textContent="ЦИКЛ "+(c+1)+" / 3";$("btx").textContent="Вдох...";$("btm").textContent="4 сек";$("bci").style.width="200px";$("bci").style.height="200px";bti=setTimeout(()=>{$("btx").textContent="Задержка...";$("btm").textContent="7 сек";bti=setTimeout(()=>{$("btx").textContent="Выдох...";$("btm").textContent="8 сек";$("bci").style.width="100px";$("bci").style.height="100px";bti=setTimeout(()=>runB(c+1),8000);},7000);},4000);}
function stopB(){clearTimeout(bti);$("BO").classList.add("hd");}
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{});}</script>
</body></html>
